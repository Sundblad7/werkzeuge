<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Höher geht immer · Die Werkzeuge</title>
<meta name="description" content="Digitaler Begleiter zum Buch „Höher geht immer“ – 34 Führungswerkzeuge zum Ausfüllen. Lokal gespeichert, ohne Login, ohne Server.">
<meta name="theme-color" content="#d4521a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Werkzeuge">
<style>
  :root{
    --orange:#d4521a; --green:#3a9e5f; --yellow:#ffbb00; --red:#c0392b;
    --ink:#333; --muted:#7f7f7f; --line:#e7e1d8; --bg:#faf8f5; --card:#fff; --sidebar:#fbf9f6;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;line-height:1.5}
  a{color:var(--orange)}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .side{width:300px;flex:none;background:var(--sidebar);border-right:1px solid var(--line);
        padding:22px 0 40px;overflow-y:auto;height:100vh;position:sticky;top:0}
  .brand{padding:0 22px 16px}
  .brand .kick{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700}
  .brand h1{font-family:Georgia,serif;font-size:20px;margin:4px 0 2px;line-height:1.15;cursor:pointer}
  .brand .meta{font-size:12px;color:var(--muted)}
  .search{margin:14px 22px 4px}
  .search input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font:inherit;font-size:14px;
       color:var(--ink);background:#fff;outline:none}
  .search input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(212,82,26,.10)}
  .navlink{display:flex;align-items:center;gap:8px;padding:7px 22px;font-size:13.5px;color:#4a4a4a;cursor:pointer;
       border-left:3px solid transparent}
  .navlink:hover{background:#f3efe9}
  .navlink.active{background:#fff;border-left-color:var(--orange);color:var(--ink);font-weight:600}
  .navlink .badge{margin-left:auto;font-size:11px;background:#fdeee6;color:var(--orange);border-radius:20px;padding:1px 8px;font-weight:700}
  .grp{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;
       padding:14px 22px 4px;margin-top:6px}
  .navitem{display:flex;align-items:baseline;gap:8px;padding:6px 22px;font-size:13.5px;color:#4a4a4a;
       cursor:pointer;border-left:3px solid transparent}
  .navitem:hover{background:#f3efe9}
  .navitem.active{background:#fff;border-left-color:var(--orange);color:var(--ink);font-weight:600}
  .navitem .t{font-size:10px;color:#bbb;border:1px solid var(--line);border-radius:4px;padding:0 4px;flex:none}
  .navitem .t.b{color:var(--orange);border-color:#f0d0c0}
  .navitem.hidden,.grp.hidden{display:none}
  /* Main */
  .main{flex:1;min-width:0;padding:34px 36px 90px;max-width:820px}
  .topbar{display:none}
  /* Home */
  .home .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);font-weight:700}
  .home h2{font-family:Georgia,serif;font-size:32px;margin:8px 0 10px;line-height:1.12}
  .home p{font-size:16px;color:#4a4a4a;max-width:62ch}
  .home .big{font-family:Georgia,serif;font-size:18px;color:#444;border-left:3px solid var(--orange);
       background:#fff;border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:8px;padding:16px 18px;margin:18px 0}
  .section-h{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:26px 0 10px}
  .quick{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
  .qcard{display:block;text-align:left;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 15px;cursor:pointer;font:inherit}
  .qcard:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(212,82,26,.06)}
  .qcard.flag{border-color:var(--orange);background:#fff8f4}
  .qcard .p{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .qcard .n{font-size:15px;font-weight:700;margin-top:3px;line-height:1.2}
  .qcard .d{font-size:12.5px;color:var(--muted);margin-top:4px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px}
  .tile{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 13px;cursor:pointer}
  .tile:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(212,82,26,.06)}
  .tile .p{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .tile .n{font-size:13.5px;font-weight:600;margin-top:3px;line-height:1.25}
  .empty{font-size:14px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:20px;text-align:center}
  /* Tool */
  .crumb{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);
         text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;gap:10px}
  .crumb .nav2{display:flex;gap:8px;flex:none}
  .crumb button{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:6px;
         padding:4px 10px;cursor:pointer;font:inherit;font-size:12px}
  .crumb button:hover{background:#f3efe9;color:var(--ink)}
  .tag{display:inline-block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;
       padding:2px 9px;border-radius:20px;margin-bottom:8px}
  .tag.blatt{background:#fdeee6;color:var(--orange)}
  .tag.impuls{background:#eaf4ee;color:var(--green)}
  .tag.routine{background:#f3efe9;color:var(--muted)}
  .editbanner{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);background:#fff;border:1px solid var(--line);
       border-left:3px solid var(--green);border-radius:8px;padding:8px 12px;margin-bottom:14px}
  .toolname{font-family:Georgia,serif;font-size:28px;line-height:1.12;margin:0 0 4px}
  .toolsub{font-size:13px;color:var(--muted);margin:0 0 16px}
  .intro{font-family:Georgia,serif;font-size:16px;color:#4a4a4a;background:#fff;border:1px solid var(--line);
         border-left:3px solid var(--orange);border-radius:8px;padding:13px 15px;margin-bottom:22px}
  .choice{margin:0 0 20px}
  .choice .cl{font-size:13px;font-weight:700;margin-bottom:8px}
  .opt{display:block;border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin-bottom:7px;cursor:pointer;
       font-size:14.5px;background:#fff}
  .opt:hover{border-color:var(--orange)}
  .opt.sel{border-color:var(--orange);background:#fdeee6;font-weight:600}
  .opt input{margin-right:9px}
  .field{margin-bottom:18px}
  .field .fl{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .field .fh{font-size:12.5px;color:var(--muted);margin-bottom:7px}
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:inherit;font-size:16px;
       color:var(--ink);background:#fff;resize:vertical;min-height:56px;outline:none}
  textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(212,82,26,.10)}
  .amp{display:flex;align-items:center;gap:8px;margin-top:8px}
  .amp span{font-size:12px;color:var(--muted)}
  .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);background:#fff;cursor:pointer}
  .dot:hover{transform:scale(1.12)}
  .dot.g.on{background:var(--green);border-color:var(--green)}
  .dot.y.on{background:var(--yellow);border-color:var(--yellow)}
  .dot.r.on{background:var(--red);border-color:var(--red)}
  .actions{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
  .btn{border-radius:8px;padding:10px 16px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--line)}
  .btn.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
  .btn.primary:hover{background:#bd4716}
  .btn.ghost{background:#fff;color:var(--ink)}
  .btn.ghost:hover{background:#f3efe9}
  .btn.danger{background:#fff;color:var(--red);border-color:#e7c4bf}
  .btn.danger:hover{background:#fbeeec}
  .src{margin-top:24px;font-size:12.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px}
  /* Notizen-Liste */
  .note{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:10px;cursor:pointer}
  .note:hover{border-color:var(--orange)}
  .note .nh{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .note .nn{font-size:15px;font-weight:700}
  .note .nd{font-size:12px;color:var(--muted);flex:none}
  .note .ns{font-size:13px;color:#5a5a5a;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .notes-foot{margin-top:24px;border-top:1px solid var(--line);padding-top:14px;display:flex;gap:18px;flex-wrap:wrap}
  .linkbtn{background:none;border:none;color:var(--muted);font:inherit;font-size:12.5px;cursor:pointer;padding:0;text-decoration:underline}
  .linkbtn:hover{color:var(--orange)}
  /* Toast */
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:#2c2c2c;color:#fff;
       font-size:13.5px;padding:10px 16px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.2);opacity:0;
       transition:opacity .25s,transform .25s;z-index:50;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* Install-Button */
  .installbtn{display:none;margin:14px 22px 0}
  .installbtn button{width:100%;border:1px solid var(--orange);background:#fff;color:var(--orange);border-radius:8px;
       padding:9px 12px;cursor:pointer;font:inherit;font-size:13px;font-weight:600}
  .installbtn button:hover{background:#fdeee6}
  .installbtn.show{display:block}
  /* Mobile */
  .menubtn{display:none}
  @media (max-width:820px){
    .side{position:fixed;left:0;top:0;z-index:30;transform:translateX(-100%);transition:transform .2s;box-shadow:4px 0 20px rgba(0,0,0,.12)}
    .side.open{transform:translateX(0)}
    .app.menuopen .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:20}
    .main{padding:18px 18px 80px}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .menubtn{display:inline-flex;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font:inherit;font-size:14px}
    .topbar .tt{font-family:Georgia,serif;font-size:16px;cursor:pointer}
  }
  @media print{
    .side,.crumb,.actions,.menubtn,.topbar,.src,.editbanner,.toast,.installbtn{display:none!important}
    .main{padding:0;max-width:100%}
    .intro,.field,.choice{break-inside:avoid}
    textarea{border:none;padding:2px 0;min-height:auto}
    .dot{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scrim" onclick="toggleMenu(false)"></div>
  <aside class="side" id="side">
    <div class="brand">
      <div class="kick">Werkzeuge</div>
      <h1 onclick="go('/')">Höher geht immer</h1>
      <div class="meta">34 Werkzeuge aus 10 Kapiteln</div>
      <div class="meta" style="margin-top:8px"><span id="saved" style="color:var(--green);opacity:0;transition:opacity .3s">✓ lokal gesichert</span></div>
    </div>
    <div class="search"><input id="q" type="search" placeholder="Werkzeug suchen …" autocomplete="off" aria-label="Werkzeug suchen"></div>
    <div id="navlinks">
      <div class="navlink" data-route="home" onclick="go('/')">Übersicht</div>
      <div class="navlink" data-route="notes" onclick="go('/notizen')">Meine Notizen <span class="badge" id="notesBadge" style="display:none">0</span></div>
    </div>
    <div class="installbtn" id="installbtn"><button onclick="promptInstall()">＋ Zum Startbildschirm</button></div>
    <div id="menu"></div>
    <div class="brand" style="padding-top:18px">
      <div class="meta"><a href="#" onclick="resetAll();return false;" style="color:var(--muted);font-size:11px">Alle Eingaben zurücksetzen</a></div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="topbar">
      <button class="menubtn" onclick="toggleMenu(true)">☰ Werkzeuge</button>
      <span class="tt" onclick="go('/')">Höher geht immer</span>
    </div>
    <div id="view"></div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
